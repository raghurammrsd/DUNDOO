{% extends "base.html" %}
{% block content %}

<!-- Custom Premium CSS for these pages included in user.css -->
<div style="padding: 40px; background-color: #f0fdf4; min-height: 100vh;">
  <div style="margin-bottom: 24px;">
    <h3 style="margin: 0; font-weight: 800; color: #115320; font-size: 24px;">Discover Products Nearby</h3>
  </div>

  <div class="glass-panel-green tilt-effect" style="margin-bottom: 40px; transform-style: preserve-3d;">
    <div style="display: flex; gap: 24px; align-items: flex-start; flex-wrap: wrap;">
      
      <div style="display: flex; flex-direction: column; gap: 8px; flex: 1; min-width: 250px;">
        <label style="color: #115320; font-weight: 700; font-size: 14px;">What are you looking for?</label>
        <input id="search-query" class="premium-input" style="width: 100%; box-sizing: border-box;" placeholder="e.g. mango, milk">
      </div>

      <div style="display: flex; flex-direction: column; gap: 8px; width: 150px;">
        <label style="color: #115320; font-weight: 700; font-size: 14px;">Min Distance (km)</label>
        <input id="min-km" type="number" value="0" step="0.1" class="premium-input" style="width: 100%; box-sizing: border-box; text-align: center;">
      </div>

      <div style="display: flex; flex-direction: column; gap: 8px; width: 150px;">
        <label style="color: #115320; font-weight: 700; font-size: 14px;">Max Distance (km)</label>
        <input id="max-km" type="number" value="10" step="0.1" class="premium-input" style="width: 100%; box-sizing: border-box; text-align: center;">
      </div>

    </div>
    
    <div style="margin-top: 24px;">
      <button id="search-btn" class="premium-btn">
        Search
      </button>
    </div>
    
    <div id="status" style="margin-top: 16px; font-weight: 500; color: #115320; font-size: 14px;">Location access required.</div>
  </div>

  <div class="glass-panel-green">
    <h5 style="font-weight: 800; margin-bottom: 24px; color: #115320; font-size: 16px;">Search Results</h5>
    <div style="overflow-x: auto; transform-style: preserve-3d;">
      <table class="table-premium">
        <thead>
          <tr>
            <th>Item</th>
            <th>Product Name</th>
            <th>Price</th>
            <th>Shop Details</th>
            <th>Distance</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="results-body">
            <tr class="tilt-effect"><td colspan="6" style="text-align: center; color: #115320; padding: 24px;">Hit search to explore nearby products!</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
let userLat = null;
let userLng = null;

const statusText = document.getElementById("status");
const resultsBody = document.getElementById("results-body");

navigator.geolocation.getCurrentPosition(
  (pos) => {
    userLat = pos.coords.latitude;
    userLng = pos.coords.longitude;
    statusText.innerText = 'Location detected.';

    // --- Phase 5: Auto-trigger search from Voice AI URL param ---
    const urlParams = new URLSearchParams(window.location.search);
    const initialQuery = urlParams.get('q');
    if (initialQuery) {
        document.getElementById("search-query").value = initialQuery;
        document.getElementById("search-btn").click();
    }
  },
  () => {
    statusText.innerText = 'Location access required.';
  }
);

document.getElementById("search-btn").addEventListener("click", () => {
  const query = document.getElementById("search-query").value;
  const minKm = document.getElementById("min-km").value;
  const maxKm = document.getElementById("max-km").value;

  if (!userLat || !userLng) {
    alert("Location not detected. Please allow location access.");
    return;
  }

  statusText.innerText = 'Searching...';

  fetch("{{ url_for('user.search_products_nearby') }}", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      query: query,
      latitude: userLat,
      longitude: userLng,
      min_distance_km: minKm,
      max_distance_km: maxKm
    })
  })
  .then(res => res.json())
  .then(data => {
    resultsBody.innerHTML = "";
    statusText.innerText = `Found ${data.products.length} products nearest to you`;

    data.products.forEach(p => {
      const row = document.createElement("tr");
      row.className = "tilt-effect"; // 3D effect class added
      row.style.transformStyle = "preserve-3d";
      
      row.innerHTML = `
        <td>
          <div style="width:60px; height:60px; border-radius:12px; overflow:hidden; border:2px solid #e9f5ec; background: white; pointer-events: none;">
            <img src="${p.image_url || '/static/uploads/products/no-image.png'}" alt="${p.product_name}" onerror="this.onerror=null; this.src='/static/uploads/products/no-image.png';" style="width:100%;height:100%;object-fit:cover;">
          </div>
        </td>
        <td style="font-weight: 700; color: #111827;">${p.product_name}</td>
        <td style="color: #115320; font-weight: 800; font-size: 18px;">₹${p.price ?? "-"}</td>
        <td style="font-size: 14px; color: #4b5563;">${p.shop_name}</td>
        <td><span style="font-weight: 600; color: #16a34a;">${p.distance_km} km</span></td>
        <td>
          <div style="display: flex; gap: 8px;">
            <a href="/user/product/${p.product_id}" class="premium-btn-outline" style="text-decoration: none; padding: 6px 12px; font-size: 13px;">
              View
            </a>
            <a href="/user/product/${p.product_id}" class="premium-btn" style="text-decoration: none; padding: 6px 12px; font-size: 13px;">
              Cart
            </a>
          </div>
        </td>
      `;
      resultsBody.appendChild(row);
    });
  });
});
</script>

{% endblock %}
