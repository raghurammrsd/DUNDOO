{% extends "base.html" %}
{% block title %}Dundoo Reels{% endblock %}

{% block content %}
<style>
  /* Local overrides to force a full height immersive view ignoring standard paddings */
  body { overflow: hidden; background: #000; }
  .dundoo-main { padding: 0 !important; max-width: 100% !important; background: #000 !important; }
  .navbar, .dundoo-sidebar { display: none !important; } /* Hide navigation for full immersive experience like TikTok */
</style>

<link rel="stylesheet" href="{{ url_for('static', filename='css/reels.css') }}">

<div class="app-reels-layout">
  <!-- Back Button overlay -->
  <a href="{{ url_for('user.dashboard') }}" class="reels-back-btn">
    <i class="fas fa-arrow-left"></i>
  </a>

  <!-- The scroll-snap container -->
  <div class="reels-viewport" id="reels-viewport">
      <!-- Reels get injected here via JS -->
      <div class="reel-loading" id="reel-loader">
        <i class="fas fa-spinner fa-spin"></i>
        <p>Loading fresh reels...</p>
      </div>
  </div>
</div>

<script src="{{ url_for('static', filename='js/user_reels.js') }}"></script>
{% endblock %}
